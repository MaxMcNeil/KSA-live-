<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        html, body {
            margin: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background: radial-gradient(ellipse at center, #4a0000 0%, #1a0000 55%, #000000 100%);
            animation: pulseBg 6s ease-in-out infinite;
            font-family: 'Cairo', sans-serif;
        }

        @keyframes pulseBg {
            0%   { filter: brightness(1); }
            50%  { filter: brightness(1.35); }
            100% { filter: brightness(1); }
        }

        /* animated marquee-style alert stripes down each side */
        body::before, body::after {
            content: "";
            position: fixed;
            top: 0;
            bottom: 0;
            width: 20px;
            background: repeating-linear-gradient(
                45deg,
                #e40000 0px, #e40000 18px,
                #150000 18px, #150000 36px
            );
            opacity: 0.95;
            z-index: 1;
            animation: stripesMove 1s linear infinite;
        }
        body::before { left: 0; }
        body::after  { right: 0; }

        @keyframes stripesMove {
            from { background-position: 0 0; }
            to   { background-position: 0 51px; }
        }

        #header {
            position: fixed;
            top: 26px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            text-align: center;
            pointer-events: none;
        }
        #header .title {
            font-size: 2.6rem;
            font-weight: 900;
            color: #ff3b3b;
            text-shadow: 0 0 14px rgba(255,0,0,0.9), 0 0 34px rgba(255,0,0,0.55);
            letter-spacing: 1px;
        }
        #header .status {
            margin-top: 8px;
            font-size: 1.2rem;
            font-weight: 700;
            color: #ffdede;
            text-shadow: 0 0 8px rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .dots span {
            display: inline-block;
            animation: blinkDot 1.4s infinite;
            opacity: 0;
        }
        .dots span:nth-child(2) { animation-delay: 0.2s; }
        .dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blinkDot {
            0%   { opacity: 0; }
            50%  { opacity: 1; }
            100% { opacity: 0; }
        }

        /* animated broadcast "LIVE" dot with pulsing ring */
        .live-dot {
            display: inline-block;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #ff1414;
            box-shadow: 0 0 0 0 rgba(255, 20, 20, 0.7);
            animation: liveRing 1.4s infinite;
        }
        @keyframes liveRing {
            0%   { box-shadow: 0 0 0 0 rgba(255, 20, 20, 0.7); }
            70%  { box-shadow: 0 0 0 14px rgba(255, 20, 20, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 20, 20, 0); }
        }

        /* --- page-turn stage --- */
        #stage {
            position: fixed;
            inset: 0;
            z-index: 2;
            perspective: 2200px;
        }

        /* positioning wrapper: centers + sizes the slot, never animates itself */
        .card-slot {
            position: absolute;
            top: 52%;
            left: 50%;
            width: 82vw;
            height: 78vh;
            max-width: 1100px;
            max-height: 820px;
            transform: translate(-50%, -50%);
        }

        /* the actual "page" that flips */
        .page {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transform-origin: right center;
            transform: rotateY(0deg);
            transition: transform 1s cubic-bezier(.45,.05,.55,.95), opacity .5s ease-in .5s;
            backface-visibility: hidden;
        }
        .page.notransition { transition: none !important; }

        .page img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 10px;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.8);
        }

        /* glossy light-sweep overlay shown only while a page is turning */
        .page .sheen {
            position: absolute;
            inset: 0;
            border-radius: 10px;
            background: linear-gradient(100deg, transparent 30%, rgba(255,255,255,0.35) 50%, transparent 70%);
            opacity: 0;
            pointer-events: none;
        }
        .page.folding .sheen {
            opacity: 1;
            animation: sheenSweep 1s ease-in-out;
        }
        @keyframes sheenSweep {
            from { transform: translateX(-100%); }
            to   { transform: translateX(100%); }
        }

        .page.folding {
            transform: rotateY(-150deg);
            opacity: 0;
        }
    </style>
</head>
<body>
    <div id="header">
        <div class="title">برقيات حينية</div>
        <div class="status" id="status">
            جاري التحميل<span class="dots"><span>.</span><span>.</span><span>.</span></span>
        </div>
    </div>
    <div id="stage"></div>
    <script>
        const CYCLE_MS = 15000;            // how long each card stays on screen
        const FOLD_MS = 1000;              // must match the CSS transition duration
        const REFRESH_MS = 5 * 60 * 1000;  // how often to check for freshly captured cards

        let count = 0;
        let cur = 0;
        let cycleTimer = null;
        let audioCtx = null;

        function setStatusLoading() {
            document.getElementById('status').innerHTML =
                'جاري التحميل<span class="dots"><span>.</span><span>.</span><span>.</span></span>';
        }

        function setStatusLive(n) {
            document.getElementById('status').innerHTML =
                `<span class="live-dot"></span> مباشر — ${n} بطاقة إخبارية`;
        }

        function playChime() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const now = audioCtx.currentTime;
                const notes = [
                    { freq: 880, start: 0,    dur: 0.14 },
                    { freq: 1320, start: 0.12, dur: 0.16 }
                ];
                notes.forEach(n => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = n.freq;
                    gain.gain.setValueAtTime(0.0001, now + n.start);
                    gain.gain.exponentialRampToValueAtTime(0.16, now + n.start + 0.02);
                    gain.gain.exponentialRampToValueAtTime(0.0001, now + n.start + n.dur);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(now + n.start);
                    osc.stop(now + n.start + n.dur + 0.02);
                });
            } catch (e) {
                console.warn('Chime failed (audio may be blocked):', e.message);
            }
        }

        function makeSlot(i, ts, zIndex, rotated) {
            const slot = document.createElement('div');
            slot.className = 'card-slot';
            slot.id = `slot${i}`;
            slot.style.zIndex = zIndex;

            const page = document.createElement('div');
            page.className = 'page';
            page.id = `page${i}`;

            const img = document.createElement('img');
            img.src = `card_${i}.png?t=${ts}`;

            const sheen = document.createElement('div');
            sheen.className = 'sheen';

            page.appendChild(img);
            page.appendChild(sheen);
            slot.appendChild(page);
            return slot;
        }

        function buildStage(newCount) {
            const stage = document.getElementById('stage');
            stage.innerHTML = '';
            const ts = Date.now();
            for (let i = 0; i < newCount; i++) {
                // card 0 starts on top (front), card 1 sits just behind it
                // ready to be revealed by the first page-turn; everything
                // else is stacked further back, hidden underneath.
                const z = i === 0 ? newCount + 2 : (i === 1 ? newCount + 1 : newCount - i);
                stage.appendChild(makeSlot(i, ts, z, false));
            }
            count = newCount;
            cur = 0;
            setStatusLive(count);
        }

        function turnPage() {
            if (count === 0) return;
            const next = (cur + 1) % count;

            const curPage = document.getElementById(`page${cur}`);
            const nextSlot = document.getElementById(`slot${next}`);

            if (!curPage || !nextSlot) return;

            // bring "next" just behind "current" so the turn reveals it
            nextSlot.style.zIndex = count + 1;

            curPage.classList.add('folding');
            playChime();

            setTimeout(() => {
                // reset the just-folded page instantly (no transition) and
                // drop it to the back of the stack for a future turn
                curPage.classList.add('notransition');
                curPage.classList.remove('folding');
                // force reflow so the notransition class takes effect before we change transform back
                void curPage.offsetWidth;
                curPage.classList.remove('notransition');

                document.getElementById(`slot${cur}`).style.zIndex = 1;
                nextSlot.style.zIndex = count + 2;

                cur = next;
            }, FOLD_MS);
        }

        function startCycle() {
            if (cycleTimer) clearInterval(cycleTimer);
            cycleTimer = setInterval(turnPage, CYCLE_MS);
        }

        async function checkForUpdates() {
            try {
                const res = await fetch('total.json?t=' + Date.now());
                const data = await res.json();
                if (data.count && data.count !== count) {
                    console.log(`Nouveau contenu détecté (${data.count} cartes), rechargement du diaporama...`);
                    buildStage(data.count);
                }
            } catch (e) {
                console.error("En attente des données...", e);
            }
        }

        async function init() {
            setStatusLoading();
            await checkForUpdates();
            startCycle();
            setInterval(checkForUpdates, REFRESH_MS);
        }

        init();
    </script>
</body>
</html>
