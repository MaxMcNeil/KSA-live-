name: Capture News
on:
  schedule:
    - cron: '0 */8 * * *'
  workflow_dispatch:
jobs:
  capture:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-node@v3
        with: 
          node-version: '18'
      
      # Nettoyage pour éviter les conflits
      - run: rm -rf node_modules package-lock.json
      
      # Installation des dépendances et du navigateur Playwright
      - run: npm install
      - run: npx playwright install chromium --with-deps
      
      # Exécution du script de capture
      - run: node capture.js
      
      - name: Commit et Push
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          # Supprimer les anciens fichiers
          git rm -f *.png || true
          # On ajoute seulement si des fichiers ont été créés
          if ls *.png >/dev/null 2>&1; then
            git add *.png
            git commit -m "Update cards" && git push
          else
            echo "Aucune image, pas de commit."
          fi
          
