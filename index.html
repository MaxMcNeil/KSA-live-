<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; width: 1080px; height: 1920px; background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d); overflow: hidden; display: flex; align-items: center; justify-content: center; }
        
        #stage { width: 600px; height: 750px; perspective: 1000px; }
        
        .card { 
            width: 100%; height: 100%; position: absolute;
            transition: transform 1s ease-in-out, opacity 1s;
            transform-origin: left center;
            backface-visibility: hidden;
            border-radius: 20px; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        /* État "plié" */
        .card.fold { transform: rotateY(-180deg); opacity: 0; }
        
img { 
    width: 100%; 
    height: 100%; 
    object-fit: contain; /* C'est cette ligne qui fait toute la différence */
    background-color: white; /* Optionnel : remplit le vide s'il y en a */
}
    </style>
</head>
<body>

    <div id="stage">
        <div id="c1" class="card"><img id="img1" src="card_0.png"></div>
        <div id="c2" class="card fold"><img id="img2" src="card_1.png"></div>
    </div>

    <script>
        let i = 0;
        function animate() {
            const c1 = document.getElementById('c1');
            const c2 = document.getElementById('c2');
            
            // On bascule la classe fold pour créer l'effet de livre
            c1.classList.toggle('fold');
            c2.classList.toggle('fold');
            
            // Chargement de la suivante en douce
            i = (i + 1) % 5;
            setTimeout(() => {
                if (c1.classList.contains('fold')) {
                    document.getElementById('img1').src = `card_${i}.png?t=${Date.now()}`;
                } else {
                    document.getElementById('img2').src = `card_${i}.png?t=${Date.now()}`;
                }
            }, 1000);
            
            setTimeout(animate, 7000);
        }
        animate();
    </script>
</body>
</html>
