<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; width: 1080px; height: 1920px; background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d); overflow: hidden; display: flex; align-items: center; justify-content: center; }
        
        /* Augmentation de la taille pour remplir l'écran */
        #stage { 
            width: 95%;      /* Utilise 95% de la largeur de l'écran */
            max-width: 1000px; /* Limite maximale pour ne pas déborder */
            height: 1080px;    /* Réduit de 10% comme demandé */
            perspective: 2000px; /* Perspective augmentée pour un effet livre plus marqué */
            margin: auto;
            position: relative;
        }

        .card { 
            width: 100%; 
            height: 100%; 
            position: absolute;
            transition: transform 1s ease-in-out, opacity 0.5s;
            transform-origin: left center;
            backface-visibility: hidden;
            border-radius: 30px; 
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            background: white; 
        }
        
        /* L'effet de pliage 3D */
        .card.fold { 
            transform: rotateY(-180deg); 
            opacity: 0.5; 
        }

        img { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
            padding: 20px;       
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div id="stage">
        <div id="c1" class="card"><img id="img1" src="card_0.png"></div>
        <div id="c2" class="card fold"><img id="img2" src="card_1.png"></div>
    </div>

        <script>
        let i = 0;
        let totalCards = 20; // Maximum étendu à 20 pour englober le mix des deux sites

        function checkImage(index, callback) {
            const testImg = new Image();
            testImg.onload = () => callback(true);
            testImg.onerror = () => callback(false);
            testImg.src = `card_${index}.png?t=${Date.now()}`;
        }

        function animate() {
            const c1 = document.getElementById('c1');
            const c2 = document.getElementById('c2');
            
            c1.classList.toggle('fold');
            c2.classList.toggle('fold');
            
            let nextIndex = (i + 1) % totalCards;

            checkImage(nextIndex, (exists) => {
                if (!exists && nextIndex > 1) {
                    totalCards = nextIndex; 
                    nextIndex = 0;
                }
                
                setTimeout(() => {
                    if (c1.classList.contains('fold')) {
                        document.getElementById('img1').src = `card_${nextIndex}.png?t=${Date.now()}`;
                    } else {
                        document.getElementById('img2').src = `card_${nextIndex}.png?t=${Date.now()}`;
                    }
                    i = nextIndex;
                }, 500);
            });
            
            setTimeout(animate, 7000);
        }
        animate();
    </script>
</body>
</html>
