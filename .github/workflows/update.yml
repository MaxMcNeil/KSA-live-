name: Capture News
on:
  schedule:
    - cron: '0 */8 * * *' # À 0 minute, toutes les 8 heures
  workflow_dispatch:
jobs:
  capture:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with: { node-version: '18' }
      - run: npm install
      - run: npx playwright install chromium
      - run: node capture.js
      - name: Commit et Push
        run: |
          git config user.name "bot"
          git add *.png
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update cards" && git push)
          
