<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <style>
        body { 
            margin: 0; 
            width: 1080px; 
            height: 1920px; 
            overflow: hidden; 
            /* Fond dégradé artistique */
            background: linear-gradient(125deg, #2c3e50, #4ca1af, #2c3e50); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        #flipbook { width: 900px; height: 700px; perspective: 2000px; }
        .page { background: white; width: 900px; height: 700px; border-radius: 20px; padding: 20px; box-sizing: border-box; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        img { width: 100%; border-radius: 15px; }
    </style>
</head>
<body>

    <div id="flipbook">
        <div class="page" id="p1"></div>
        <div class="page" id="p2"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>
    <script>
        const images = ['card_0.png', 'card_1.png', 'card_2.png', 'card_3.png', 'card_4.png'];
        let idx = 0;

        // Initialisation du flipbook
        $('#flipbook').turn({ width: 900, height: 700, autoCenter: true });

        function update() {
            const imgPath = images[idx % images.length] + '?t=' + Date.now();
            const target = (idx % 2 === 0) ? '#p1' : '#p2';
            document.querySelector(target).innerHTML = `<img src="${imgPath}">`;
            
            // Déclenche le tournage de page
            $('#flipbook').turn('next');
            
            idx++;
            setTimeout(update, 7000);
        }
        update();
    </script>
</body>
</html>
