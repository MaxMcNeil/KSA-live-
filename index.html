<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; background: transparent; width: 1080px; height: 1920px; overflow: hidden; }
        .buffer { position: absolute; width: 100%; transition: opacity 1s; opacity: 0; }
        .show { opacity: 1; }
    </style>
</head>
<body>
    <div id="layer1" class="buffer"></div>
    <div id="layer2" class="buffer"></div>

    <script>
        let toggle = true;
        let i = 0;
        
        function preload(index) {
            const img = new Image();
            img.src = `card_${index}.png?t=${Date.now()}`;
        }

        function play() {
            const active = toggle ? 'layer1' : 'layer2';
            const hidden = toggle ? 'layer2' : 'layer1';
            const container = document.getElementById(active);
            
            container.innerHTML = `<img src="card_${i}.png?t=${Date.now()}" style="width:100%">`;
            container.classList.add('show');
            document.getElementById(hidden).classList.remove('show');
            
            toggle = !toggle;
            i = (i + 1) % 5;
            preload(i); // Précharge la suivante
            
            setTimeout(play, 7000);
        }
        play();
    </script>
</body>
</html>
