<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .card { width: 800px; height: 600px; position: absolute; transition: opacity 1s, transform 1s; backface-visibility: hidden; }
        .fold { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>
    <div id="stage"></div>
    <script>
        async function init() {
            try {
                const res = await fetch('total.json?t=' + Date.now());
                const { count } = await res.json();
                const stage = document.getElementById('stage');
                
                for(let i = 0; i < count; i++) {
                    const img = document.createElement('img');
                    img.src = `card_${i}.png?t=${Date.now()}`;
                    img.className = i === 0 ? 'card' : 'card fold';
                    img.id = `c${i}`;
                    stage.appendChild(img);
                }

                let cur = 0;
                setInterval(() => {
                    document.getElementById(`c${cur}`).classList.add('fold');
                    cur = (cur + 1) % count;
                    document.getElementById(`c${cur}`).classList.remove('fold');
                }, 7000);
            } catch(e) { console.error("En attente des données..."); }
        }
        init();
    </script>
</body>
</html>
