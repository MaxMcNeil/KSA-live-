<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <style>
        html, body {
            margin: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background: radial-gradient(ellipse at center, #3a0000 0%, #1a0000 55%, #000000 100%);
            background-size: 200% 200%;
            animation: pulseBg 6s ease-in-out infinite;
        }

        @keyframes pulseBg {
            0%   { background-position: 50% 50%; filter: brightness(1); }
            50%  { background-position: 50% 50%; filter: brightness(1.25); }
            100% { background-position: 50% 50%; filter: brightness(1); }
        }

        /* subtle alert-style accents so it reads as "breaking news" without fighting with the card */
        body::before, body::after {
            content: "";
            position: fixed;
            top: 0;
            bottom: 0;
            width: 14px;
            background: repeating-linear-gradient(
                45deg,
                #c40000 0px, #c40000 18px,
                #1a0000 18px, #1a0000 36px
            );
            opacity: 0.85;
            z-index: 1;
        }
        body::before { left: 0; }
        body::after  { right: 0; }

        .card {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            max-width: 88vw;
            max-height: 88vh;
            width: auto;
            height: auto;
            object-fit: contain;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.75);
            border-radius: 10px;
            transition: opacity 1s, transform 1s;
            backface-visibility: hidden;
            z-index: 2;
        }

        .fold {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="stage"></div>
    <script>
        const CYCLE_MS = 7000;             // how often the slideshow flips cards
        const REFRESH_MS = 5 * 60 * 1000;  // how often to check for freshly captured cards

        let count = 0;
        let cur = 0;
        let cycleTimer = null;

        function buildStage(newCount) {
            const stage = document.getElementById('stage');
            stage.innerHTML = '';
            const ts = Date.now();
            for (let i = 0; i < newCount; i++) {
                const img = document.createElement('img');
                img.src = `card_${i}.png?t=${ts}`;
                img.className = i === 0 ? 'card' : 'card fold';
                img.id = `c${i}`;
                stage.appendChild(img);
            }
            count = newCount;
            cur = 0;
        }

        function startCycle() {
            if (cycleTimer) clearInterval(cycleTimer);
            cycleTimer = setInterval(() => {
                if (count === 0) return;
                const curEl = document.getElementById(`c${cur}`);
                if (curEl) curEl.classList.add('fold');
                cur = (cur + 1) % count;
                const nextEl = document.getElementById(`c${cur}`);
                if (nextEl) nextEl.classList.remove('fold');
            }, CYCLE_MS);
        }

        async function checkForUpdates() {
            try {
                const res = await fetch('total.json?t=' + Date.now());
                const data = await res.json();
                if (data.count && data.count !== count) {
                    console.log(`Nouveau contenu détecté (${data.count} cartes), rechargement du diaporama...`);
                    buildStage(data.count);
                }
            } catch (e) {
                console.error("En attente des données...", e);
            }
        }

        async function init() {
            await checkForUpdates();
            startCycle();
            // Re-check periodically so a long-running OBS browser source
            // picks up new captures without ever needing a manual reload.
            setInterval(checkForUpdates, REFRESH_MS);
        }

        init();
    </script>
</body>
</html>
