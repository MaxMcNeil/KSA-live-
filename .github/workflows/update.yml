name: Capture News
on:
  schedule:
    - cron: '0 */8 * * *'
  workflow_dispatch:
jobs:
  capture:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-node@v3
        with: 
          node-version: '18'
      
      # Installation automatique d'axios et cheerio définis dans ton package.json
      - run: npm install
      
      # Exécution du script de capture ultra-rapide
      - run: node capture.js
      
      - name: Commit et Push
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          # Supprimer les anciens fichiers PNG avant d'ajouter les nouveaux
          git rm -f *.png || true
          git add *.png
          # Commit uniquement en cas de changement
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update cards" && git push)
          
